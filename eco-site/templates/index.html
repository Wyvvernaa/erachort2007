<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Экология Казахстана</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1508780709619-79562169bc64');
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

header h1 { font-size: 50px; }
header p { opacity: 0.8; }

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

section {
    padding: 60px 20px;
    max-width: 900px;
    margin: auto;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.stat {
    font-size: 35px;
    color: #22c55e;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Экология Казахстана</h1>
    <p>Проблемы и решения</p>
  </div>
</header>

<section>
  <h2>🌍 Проблемы</h2>
  <div class="cards">
    <div class="card">Загрязнение воздуха</div>
    <div class="card">Аральское море</div>
    <div class="card">Мусор и отходы</div>
  </div>
</section>

<section>
  <h2>📊 Статистика</h2>
  <div class="cards">
    <div class="card"><div class="stat">40%</div> транспорт</div>
    <div class="card"><div class="stat">30%</div> отходы</div>
    <div class="card"><div class="stat">15%</div> переработка</div>
  </div>
</section>

<section>
  <h2>✅ Решения</h2>
  <div class="cards">
    <div class="card">Переработка мусора</div>
    <div class="card">Эко транспорт</div>
    <div class="card">Озеленение</div>
  </div>
</section>

<footer>
  © 2026 Экология Казахстана
</footer>

</body>
</html>
